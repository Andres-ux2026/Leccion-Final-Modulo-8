<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container text-center mt-5">
        <div class="card shadow p-5 bg-white rounded">
            <h1 class="mb-4 text-primary">Bienvenido al CRUD de Libros</h1>
            <p class="text-muted mb-5">Selecciona una de las siguientes opciones para administrar la biblioteca:</p>

            <div class="d-grid gap-3 col-6 mx-auto">
                <a href="{% url 'lista_libros' %}" class="btn btn-info btn-lg text-white fw-bold">
                    📋 Lista de Libros
                </a>

                <a href="{% url 'crear_libro' %}" class="btn btn-success btn-lg fw-bold">
                    ➕ Crear Libro
                </a>
            </div>

            <hr class="my-4">

            <div class="alert alert-warning col-8 mx-auto" role="alert">
                <small class="text-dark">
                    💡 <strong>Nota:</strong> Para <strong>Modificar</strong> o <strong>Eliminar</strong> un libro, ve a la <em>Lista de Libros</em>. Desde allí podrás seleccionar el libro específico que deseas editar o borrar mediante su ID.
                </small>
            </div>
        </div>
    </div>

</body>
</html>
